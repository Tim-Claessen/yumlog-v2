name: Process Recipes
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'recipes/**'
permissions:
  contents: write
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Run search_prep.py
        run: python _tools/search_prep.py
      - name: Run update_indexes.py
        run: python _tools/update_indexes.py
      - name: Commit regenerated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Regenerate search + indexes [skip ci]"
          file_pattern: "search.json category/** protein/** indexes/**"
